{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">

</head>
<body>

<div class="navbar">
    <h2>⚡ Authenticator Dashboard</h2>
    <div class="nav-actions">
        <button class="profile-btn" onclick="toggleProfile()">Profile</button>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</div>

<div id="profileDropdown" class="profile-dropdown">
    <p id="profileUsername"></p>
    <p id="profileEmail"></p>
</div>

<div class="container">
    <div class="welcome-card">
        <h1 id="welcomeText">Loading...</h1>
        <p>Welcome back! Here's what's happening today 💙</p>
    </div>

    <div class="cards">
        <div class="card">📊 Analytics</div>
        <div class="card">📁 Projects</div>
        <div class="card">⚙️ Settings</div>
    </div>
</div>

<script src="{% static 'js/dashboard.js' %}"></script>
</body>
</html>
